<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9dc12"/>
      <stop offset="45%" stop-color="#ed692b"/>
      <stop offset="100%" stop-color="#8d173a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Outer crosshair ring -->
  <circle cx="16" cy="16" r="9" stroke="#1c0b18" stroke-width="1.8" fill="none" opacity="0.85"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.8" fill="#1c0b18" opacity="0.85"/>
  <!-- Crosshair lines (gaps cut by ring) -->
  <line x1="16" y1="4"  x2="16" y2="7"  stroke="#1c0b18" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="16" y1="25" x2="16" y2="28" stroke="#1c0b18" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="4"  y1="16" x2="7"  y2="16" stroke="#1c0b18" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="25" y1="16" x2="28" y2="16" stroke="#1c0b18" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
</svg>
